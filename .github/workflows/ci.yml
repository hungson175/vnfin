name: CI

# Offline-only release gate: installs the package + dev extras and runs the
# default (offline, synthetic-fixture) test suite with an enforced coverage
# threshold. Live tests in live_tests/ are NEVER run here — VNFIN_LIVE is never
# set, so live_tests/conftest.py keeps them out of collection and the package's
# default `testpaths = ["tests"]` only collects the offline suite.

on:
  push:
    branches: ["**"]
  pull_request:

# Make doubly sure no step accidentally enables the live network suite.
env:
  VNFIN_LIVE: ""

jobs:
  test:
    name: offline tests + coverage gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run offline test suite with coverage gate
        # --cov-fail-under=85 fails the job if line coverage drops below 85%.
        # The repo currently sits well above this (~94%); the gate guards against
        # regressions. The offline suite must stay green with 0 skipped / 0 xfail.
        run: pytest --cov=vnfin --cov-report=term-missing --cov-fail-under=85
